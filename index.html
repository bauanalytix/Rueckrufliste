<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rückrufliste V2</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
    color: #222;
  }
  header {
    background: #8b0000;
    color: white;
    padding: 16px;
    text-align: center;
    font-size: 1.25rem;
    font-weight: bold;
  }
  main {
    padding: 14px;
    max-width: 680px;
    margin: auto;
  }
  .box {
    background: white;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }
  label {
    font-size: 0.9rem;
    font-weight: bold;
    display: block;
    margin-top: 8px;
  }
  input, textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 11px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
  }
  textarea {
    min-height: 70px;
    resize: vertical;
  }
  button, .callbtn {
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 1rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    text-align: center;
  }
  .primary {
    background: #8b0000;
    color: white;
    width: 100%;
    margin-top: 12px;
  }
  .secondary {
    background: #e8e8e8;
    color: #222;
  }
  .danger {
    background: #555;
    color: white;
  }
  .callbtn {
    background: #0a7a25;
    color: white;
  }
  .entry {
    border-top: 1px solid #ddd;
    padding: 12px 0;
  }
  .entry:first-child {
    border-top: none;
  }
  .note {
    font-weight: bold;
    font-size: 1.05rem;
    white-space: pre-wrap;
  }
  .phone {
    margin-top: 5px;
    color: #444;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .move {
    display: flex;
    gap: 8px;
  }
  .move button {
    flex: 1;
  }
  .empty {
    color: #666;
    text-align: center;
    padding: 16px;
  }
</style>
</head>
<body>
<header>Rückrufliste</header>

<main>
  <section class="box">
    <label for="note">Notiz</label>
    <textarea id="note" placeholder="Name / Hinweis"></textarea>

    <label for="phone">Telefonnummer</label>
    <input id="phone" type="tel" placeholder="Telefonnummer">

    <button class="primary" onclick="addEntry()">Hinzufügen</button>
  </section>

  <section class="box">
    <strong>Offene Rückrufe</strong>
    <div id="list"></div>
  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  updateDoc,
  doc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHgAgYB4YXvbBzWIc7rs3SrwIAkuSPvHs",
  authDomain: "rueckrufliste-1caf7.firebaseapp.com",
  projectId: "rueckrufliste-1caf7",
  storageBucket: "rueckrufliste-1caf7.firebasestorage.app",
  messagingSenderId: "889083662057",
  appId: "1:889083662057:web:42656742c05d5f3f86ea78"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rueckrufeRef = collection(db, "Rückrufe");

let entries = [];

const q = query(rueckrufeRef, orderBy("position", "asc"));

onSnapshot(q, (snapshot) => {
  entries = snapshot.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));
  render();
});

function normalizePhone(phone) {
  return String(phone || "").replace(/[^\d+]/g, "");
}

window.addEntry = async function() {
  const note = document.getElementById("note").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if (!note && !phone) {
    alert("Bitte Notiz oder Telefonnummer eintragen.");
    return;
  }

  const maxPosition = entries.length
    ? Math.max(...entries.map(e => Number(e.position) || 0))
    : 0;

  await addDoc(rueckrufeRef, {
    note,
    phone,
    position: maxPosition + 1,
    created: new Date().toISOString()
  });

  document.getElementById("note").value = "";
  document.getElementById("phone").value = "";
};

window.deleteEntry = async function(id) {
  const ok = confirm("Eintrag löschen?");
  if (!ok) return;

  await deleteDoc(doc(db, "Rückrufe", id));
};

window.editEntry = async function(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;

  const newNote = prompt("Notiz:", e.note || "");
  if (newNote === null) return;

  const newPhone = prompt("Telefonnummer:", e.phone || "");
  if (newPhone === null) return;

  await updateDoc(doc(db, "Rückrufe", id), {
    note: newNote.trim(),
    phone: newPhone.trim()
  });
};

window.moveUp = async function(index) {
  if (index <= 0) return;

  const current = entries[index];
  const above = entries[index - 1];

  await updateDoc(doc(db, "Rückrufe", current.id), {
    position: Number(above.position) || index
  });

  await updateDoc(doc(db, "Rückrufe", above.id), {
    position: Number(current.position) || index + 1
  });
};

window.moveDown = async function(index) {
  if (index >= entries.length - 1) return;

  const current = entries[index];
  const below = entries[index + 1];

  await updateDoc(doc(db, "Rückrufe", current.id), {
    position: Number(below.position) || index + 2
  });

  await updateDoc(doc(db, "Rückrufe", below.id), {
    position: Number(current.position) || index + 1
  });
};

function render() {
  const list = document.getElementById("list");

  if (entries.length === 0) {
    list.innerHTML = '<div class="empty">Keine offenen Rückrufe.</div>';
    return;
  }

  list.innerHTML = entries.map((e, index) => {
    const cleanPhone = normalizePhone(e.phone || "");
    const call = cleanPhone
      ? `<a class="callbtn" href="tel:${cleanPhone}">Anrufen</a>`
      : `<button class="secondary" disabled>Keine Nummer</button>`;

    return `
      <div class="entry">
        <div class="note">${escapeHtml(e.note || "Ohne Notiz")}</div>
        <div class="phone">${escapeHtml(e.phone || "")}</div>
        <div class="actions">
          ${call}
          <button class="danger" onclick="deleteEntry('${e.id}')">Erledigt</button>
          <button class="secondary" onclick="editEntry('${e.id}')">Ändern</button>
          <div class="move">
            <button class="secondary" onclick="moveUp(${index})">↑</button>
            <button class="secondary" onclick="moveDown(${index})">↓</button>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>
  
</body>
</html>
  
</body>
</html>
